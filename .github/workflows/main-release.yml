name: Build and Publish on Main

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: main-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-version-changes:
    name: Detect package version changes
    runs-on: ubuntu-latest
    outputs:
      cli_changed: ${{ steps.detect.outputs.cli_changed }}
      core_changed: ${{ steps.detect.outputs.core_changed }}
      i18n_changed: ${{ steps.detect.outputs.i18n_changed }}
      cli_version: ${{ steps.detect.outputs.cli_version }}
      core_version: ${{ steps.detect.outputs.core_version }}
      i18n_version: ${{ steps.detect.outputs.i18n_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Detect changed package versions
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"

          if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi

          read_version() {
            local sha="$1"
            local manifest="$2"

            git show "${sha}:${manifest}" 2>/dev/null | node -e "
              let raw = '';
              process.stdin.on('data', (chunk) => (raw += chunk));
              process.stdin.on('end', () => {
                try {
                  const json = JSON.parse(raw);
                  process.stdout.write(json.version ?? '');
                } catch {
                  process.stdout.write('');
                }
              });
            "
          }

          compare_version() {
            local key="$1"
            local manifest="$2"
            local old_version
            local new_version

            old_version="$(read_version "$BASE_SHA" "$manifest" || true)"
            new_version="$(read_version "$HEAD_SHA" "$manifest" || true)"
            echo "${key}_version=$new_version" >> "$GITHUB_OUTPUT"

            if [[ -n "$new_version" && "$old_version" != "$new_version" ]]; then
              echo "${key}_changed=true" >> "$GITHUB_OUTPUT"
              echo "$key version changed: ${old_version:-none} -> $new_version"
            else
              echo "${key}_changed=false" >> "$GITHUB_OUTPUT"
              echo "$key version unchanged: ${new_version:-none}"
            fi
          }

          compare_version "cli" "packages/cli/package.json"
          compare_version "core" "packages/core/package.json"
          compare_version "i18n" "packages/i18n/package.json"

  build-artifacts:
    name: Build and upload package artifacts
    runs-on: ubuntu-latest
    needs: detect-version-changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: cli
            package_name: "@plop-next/cli"
            changed_output: "cli_changed"
          - key: core
            package_name: "@plop-next/core"
            changed_output: "core_changed"
          - key: i18n
            package_name: "@plop-next/i18n"
            changed_output: "i18n_changed"
    if: ${{ needs.detect-version-changes.outputs[matrix.changed_output] == 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build package
        run: yarn workspace "${{ matrix.package_name }}" build

      - name: Create zip artifact
        shell: bash
        run: |
          set -euo pipefail
          out_dir="artifacts/${{ matrix.key }}"
          package_dir="packages/${{ matrix.key }}"

          mkdir -p "$out_dir"
          cp -R "$package_dir/dist" "$out_dir/dist"
          cp "$package_dir/package.json" "$out_dir/package.json"

          if [[ -f "$package_dir/README.md" ]]; then
            cp "$package_dir/README.md" "$out_dir/README.md"
          fi

          if [[ -f "LICENSE" ]]; then
            cp "LICENSE" "$out_dir/LICENSE"
          fi

          (cd artifacts && zip -r "../${{ matrix.key }}-dist.zip" "${{ matrix.key }}" >/dev/null)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.key }}-dist-${{ github.sha }}
          path: ${{ matrix.key }}-dist.zip
          if-no-files-found: error

      - name: Record build status
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .status
          cat > ".status/build-status-${{ matrix.key }}.json" <<EOF
          {"package":"${{ matrix.key }}","status":"${{ job.status }}"}
          EOF

      - name: Upload build status artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: build-status-${{ matrix.key }}
          path: .status/build-status-${{ matrix.key }}.json
          if-no-files-found: error

  publish-npm:
    name: Publish package to npm
    runs-on: ubuntu-latest
    needs: detect-version-changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: cli
            package_name: "@plop-next/cli"
            changed_output: "cli_changed"
          - key: core
            package_name: "@plop-next/core"
            changed_output: "core_changed"
          - key: i18n
            package_name: "@plop-next/i18n"
            changed_output: "i18n_changed"
    if: ${{ needs.detect-version-changes.outputs[matrix.changed_output] == 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build package before publish
        run: yarn workspace "${{ matrix.package_name }}" build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: yarn workspace "${{ matrix.package_name }}" npm publish --access public --tolerate-republish

      - name: Read package version
        id: package-version
        shell: bash
        run: |
          set -euo pipefail
          version=$(node -p "JSON.parse(require('node:fs').readFileSync('./packages/${{ matrix.key }}/package.json', 'utf8')).version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create and push package tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ matrix.key }}-V-${{ steps.package-version.outputs.version }}"

          if git ls-remote --tags --exit-code origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "$tag" -m "Release $tag"
          git push origin "refs/tags/$tag"

      - name: Record publish status
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .status
          cat > ".status/publish-status-${{ matrix.key }}.json" <<EOF
          {"package":"${{ matrix.key }}","status":"${{ job.status }}"}
          EOF

      - name: Upload publish status artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: publish-status-${{ matrix.key }}
          path: .status/publish-status-${{ matrix.key }}.json
          if-no-files-found: error

  release-summary:
    name: Release summary
    runs-on: ubuntu-latest
    needs: [detect-version-changes, build-artifacts, publish-npm]
    if: ${{ always() }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download build status artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: build-status-*
          path: .status
          merge-multiple: true
          if-no-artifact-found: ignore

      - name: Download publish status artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: publish-status-*
          path: .status
          merge-multiple: true
          if-no-artifact-found: ignore

      - name: Publish workflow summary
        shell: bash
        env:
          CLI_CHANGED: ${{ needs.detect-version-changes.outputs.cli_changed }}
          CORE_CHANGED: ${{ needs.detect-version-changes.outputs.core_changed }}
          I18N_CHANGED: ${{ needs.detect-version-changes.outputs.i18n_changed }}
          CLI_VERSION: ${{ needs.detect-version-changes.outputs.cli_version }}
          CORE_VERSION: ${{ needs.detect-version-changes.outputs.core_version }}
          I18N_VERSION: ${{ needs.detect-version-changes.outputs.i18n_version }}
        run: |
          set -euo pipefail

          status_for_step() {
            local changed="$1"
            local status_file="$2"

            if [[ "$changed" != "true" ]]; then
              echo "skipped (version unchanged)"
              return
            fi

            if [[ ! -f "$status_file" ]]; then
              echo "unknown (status artifact missing)"
              return
            fi

            local value
            value=$(node -e "const fs=require('node:fs');const j=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(j.status||'unknown');" "$status_file")

            case "$value" in
              success) echo "success" ;;
              failure) echo "failure" ;;
              cancelled) echo "cancelled" ;;
              skipped) echo "skipped" ;;
              *) echo "$value" ;;
            esac
          }

          tag_status() {
            local key="$1"
            local changed="$2"
            local version="$3"

            if [[ "$changed" != "true" ]]; then
              echo "not created"
              return
            fi

            local tag="${key}-V-${version}"
            if git ls-remote --tags --exit-code origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "created (${tag})"
            else
              echo "missing (${tag})"
            fi
          }

          {
            echo "## Release summary"
            echo
            echo "| Package | Version | Version changed | Artifact build/upload | NPM publish | Tag |"
            echo "| --- | --- | --- | --- | --- | --- |"
            echo "| cli | ${CLI_VERSION:-n/a} | ${CLI_CHANGED} | $(status_for_step "$CLI_CHANGED" ".status/build-status-cli.json") | $(status_for_step "$CLI_CHANGED" ".status/publish-status-cli.json") | $(tag_status "cli" "$CLI_CHANGED" "$CLI_VERSION") |"
            echo "| core | ${CORE_VERSION:-n/a} | ${CORE_CHANGED} | $(status_for_step "$CORE_CHANGED" ".status/build-status-core.json") | $(status_for_step "$CORE_CHANGED" ".status/publish-status-core.json") | $(tag_status "core" "$CORE_CHANGED" "$CORE_VERSION") |"
            echo "| i18n | ${I18N_VERSION:-n/a} | ${I18N_CHANGED} | $(status_for_step "$I18N_CHANGED" ".status/build-status-i18n.json") | $(status_for_step "$I18N_CHANGED" ".status/publish-status-i18n.json") | $(tag_status "i18n" "$I18N_CHANGED" "$I18N_VERSION") |"
          } >> "$GITHUB_STEP_SUMMARY"

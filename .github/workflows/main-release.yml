name: Publish Package on Tag

on:
  push:
    tags:
      - cli-V-*
      - core-V-*
      - i18n-V-*

permissions:
  id-token: write
  contents: read

concurrency:
  group: tag-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-target:
    name: Resolve target package from tag
    runs-on: ubuntu-latest
    outputs:
      key: ${{ steps.resolve.outputs.key }}
      package_name: ${{ steps.resolve.outputs.package_name }}
      tag_version: ${{ steps.resolve.outputs.tag_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve package and validate tag version
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"

          case "$tag" in
            cli-V-*)
              key="cli"
              package_name="@plop-next/cli"
              tag_version="${tag#cli-V-}"
              ;;
            core-V-*)
              key="core"
              package_name="@plop-next/core"
              tag_version="${tag#core-V-}"
              ;;
            i18n-V-*)
              key="i18n"
              package_name="@plop-next/i18n"
              tag_version="${tag#i18n-V-}"
              ;;
            *)
              echo "Unsupported tag format: $tag"
              exit 1
              ;;
          esac

          manifest="./packages/${key}/package.json"
          package_version=$(node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(pkg.version);" "$manifest")

          if [[ "$package_version" != "$tag_version" ]]; then
            echo "Tag version mismatch for ${package_name}: tag=${tag_version}, package.json=${package_version}"
            exit 1
          fi

          echo "key=$key" >> "$GITHUB_OUTPUT"
          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "tag_version=$tag_version" >> "$GITHUB_OUTPUT"

  build-artifact:
    name: Build and upload package artifact
    runs-on: ubuntu-latest
    needs: resolve-target

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build package
        shell: bash
        run: |
          set -euo pipefail
          key="${{ needs.resolve-target.outputs.key }}"

          # Build dependency chain first so tsup can resolve workspace d.ts exports.
          case "$key" in
            core)
              yarn workspace "@plop-next/core" build
              ;;
            i18n)
              yarn workspace "@plop-next/core" build
              yarn workspace "@plop-next/i18n" build
              ;;
            cli)
              yarn workspace "@plop-next/core" build
              yarn workspace "@plop-next/i18n" build
              yarn workspace "@plop-next/cli" build
              ;;
            *)
              echo "Unsupported package key: $key"
              exit 1
              ;;
          esac

      - name: Create zip artifact
        shell: bash
        run: |
          set -euo pipefail
          key="${{ needs.resolve-target.outputs.key }}"
          out_dir="artifacts/${key}"
          package_dir="packages/${key}"

          mkdir -p "$out_dir"
          cp -R "$package_dir/dist" "$out_dir/dist"
          cp "$package_dir/package.json" "$out_dir/package.json"

          if [[ -f "$package_dir/README.md" ]]; then
            cp "$package_dir/README.md" "$out_dir/README.md"
          fi

          if [[ -f "LICENSE" ]]; then
            cp "LICENSE" "$out_dir/LICENSE"
          fi

          (cd artifacts && zip -r "../${key}-dist.zip" "$key" >/dev/null)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.resolve-target.outputs.key }}-dist-${{ github.sha }}
          path: ${{ needs.resolve-target.outputs.key }}-dist.zip
          if-no-files-found: error

  publish-npm:
    name: Publish package to npm
    runs-on: ubuntu-latest
    needs: [resolve-target, build-artifact]
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build package before publish
        shell: bash
        run: |
          set -euo pipefail
          key="${{ needs.resolve-target.outputs.key }}"

          # Build dependency chain first so tsup can resolve workspace d.ts exports.
          case "$key" in
            core)
              yarn workspace "@plop-next/core" build
              ;;
            i18n)
              yarn workspace "@plop-next/core" build
              yarn workspace "@plop-next/i18n" build
              ;;
            cli)
              yarn workspace "@plop-next/core" build
              yarn workspace "@plop-next/i18n" build
              yarn workspace "@plop-next/cli" build
              ;;
            *)
              echo "Unsupported package key: $key"
              exit 1
              ;;
          esac

      - name: Check if version already published
        id: already-published
        shell: bash
        run: |
          set -euo pipefail
          package_name="${{ needs.resolve-target.outputs.package_name }}"
          package_version="${{ needs.resolve-target.outputs.tag_version }}"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is already published on npm."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm (Trusted Publishers)
        if: ${{ steps.already-published.outputs.already_published != 'true' }}
        working-directory: packages/${{ needs.resolve-target.outputs.key }}
        run: npm publish --access public

  release-summary:
    name: Release summary
    runs-on: ubuntu-latest
    needs: [resolve-target, build-artifact, publish-npm]
    if: ${{ always() }}

    steps:
      - name: Publish workflow summary
        shell: bash
        env:
          KEY: ${{ needs.resolve-target.outputs.key }}
          PACKAGE_NAME: ${{ needs.resolve-target.outputs.package_name }}
          TAG_VERSION: ${{ needs.resolve-target.outputs.tag_version }}
          BUILD_RESULT: ${{ needs.build-artifact.result }}
          PUBLISH_RESULT: ${{ needs.publish-npm.result }}
        run: |
          set -euo pipefail

          {
            echo "## Release summary"
            echo
            echo "- Tag: ${GITHUB_REF_NAME}"
            echo "- Package key: ${KEY}"
            echo "- Package name: ${PACKAGE_NAME}"
            echo "- Version: ${TAG_VERSION}"
            echo "- Build artifact: ${BUILD_RESULT}"
            echo "- npm publish: ${PUBLISH_RESULT}"
          } >> "$GITHUB_STEP_SUMMARY"

name: Publish Package on Tag

on:
  push:
    tags:
      - cli-V-*
      - core-V-*
      - i18n-V-*

permissions:
  id-token: write
  contents: read

concurrency:
  group: tag-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-target:
    name: Resolve target package and version from tag
    runs-on: ubuntu-latest
    outputs:
      key: ${{ steps.resolve.outputs.key }}
      package_name: ${{ steps.resolve.outputs.package_name }}
      version: ${{ steps.resolve.outputs.version }}

    steps:
      - name: Resolve package and validate tag version
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"

          case "$tag" in
            cli-V-*)
              key="cli"
              package_name="@plop-next/cli"
              version="${tag#cli-V-}"
              ;;
            core-V-*)
              key="core"
              package_name="@plop-next/core"
              version="${tag#core-V-}"
              ;;
            i18n-V-*)
              key="i18n"
              package_name="@plop-next/i18n"
              version="${tag#i18n-V-}"
              ;;
            *)
              echo "Unsupported tag format: $tag"
              exit 1
              ;;
          esac

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag version must be in x.x.x format. Received: $version"
            exit 1
          fi

          echo "key=$key" >> "$GITHUB_OUTPUT"
          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-package:
    name: Build package once
    runs-on: ubuntu-latest
    needs: resolve-target

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Align package version from tag
        run: yarn workspace "${{ needs.resolve-target.outputs.package_name }}" version ${{ needs.resolve-target.outputs.version }} --no-git-tag-version

      - name: Build package
        shell: bash
        run: |
          set -euo pipefail
          key="${{ needs.resolve-target.outputs.key }}"

          # Build dependency chain first so tsup can resolve workspace d.ts exports.
          case "$key" in
            core)
              yarn workspace "@plop-next/core" build
              ;;
            i18n)
              yarn workspace "@plop-next/core" build
              yarn workspace "@plop-next/i18n" build
              ;;
            cli)
              yarn workspace "@plop-next/core" build
              yarn workspace "@plop-next/i18n" build
              yarn workspace "@plop-next/cli" build
              ;;
            *)
              echo "Unsupported package key: $key"
              exit 1
              ;;
          esac

      - name: Run tests
        run: yarn test

      - name: Prepare publish bundle
        shell: bash
        run: |
          set -euo pipefail
          key="${{ needs.resolve-target.outputs.key }}"
          package_dir="packages/${key}"
          out_dir="build-bundle/${key}"

          mkdir -p "$out_dir"
          cp -R "$package_dir/dist" "$out_dir/dist"
          cp "$package_dir/package.json" "$out_dir/package.json"

          if [[ -f "$package_dir/README.md" ]]; then
            cp "$package_dir/README.md" "$out_dir/README.md"
          fi

          if [[ -f "LICENSE" ]]; then
            cp "LICENSE" "$out_dir/LICENSE"
          fi

      - name: Upload build bundle
        uses: actions/upload-artifact@v4
        with:
          name: build-bundle-${{ needs.resolve-target.outputs.key }}-${{ github.sha }}
          path: build-bundle/${{ needs.resolve-target.outputs.key }}
          if-no-files-found: error

  zip-package:
    name: Zip package and create GitHub release
    runs-on: ubuntu-latest
    needs: [resolve-target, build-package]
    permissions:
      contents: write

    steps:
      - name: Download build bundle
        uses: actions/download-artifact@v5
        with:
          name: build-bundle-${{ needs.resolve-target.outputs.key }}-${{ github.sha }}
          path: build-bundle

      - name: Create zip artifact
        shell: bash
        run: |
          set -euo pipefail
          key="${{ needs.resolve-target.outputs.key }}"
          (cd build-bundle && zip -r "../${key}-dist.zip" "$key" >/dev/null)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.resolve-target.outputs.key }}-dist-${{ github.sha }}
          path: ${{ needs.resolve-target.outputs.key }}-dist.zip
          if-no-files-found: error

      - name: Create GitHub Release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: ${{ needs.resolve-target.outputs.key }}-dist.zip
          fail_on_unmatched_files: true

  publish-npm:
    name: Publish package to npm
    runs-on: ubuntu-latest
    needs: [resolve-target, build-package]
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download build bundle
        uses: actions/download-artifact@v5
        with:
          name: build-bundle-${{ needs.resolve-target.outputs.key }}-${{ github.sha }}
          path: build-bundle

      - name: Check if version already published
        id: already-published
        shell: bash
        run: |
          set -euo pipefail
          package_name="${{ needs.resolve-target.outputs.package_name }}"
          package_version="${{ needs.resolve-target.outputs.version }}"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is already published on npm."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate manifest for npm publish
        if: ${{ steps.already-published.outputs.already_published != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          key="${{ needs.resolve-target.outputs.key }}"
          manifest="build-bundle/${key}/package.json"

          node -e "const fs=require('node:fs'); const path=process.argv[1]; const pkg=JSON.parse(fs.readFileSync(path,'utf8')); const fields=['dependencies','peerDependencies','optionalDependencies']; const offenders=[]; for (const field of fields) { const map=pkg[field]||{}; for (const [name,version] of Object.entries(map)) { if (typeof version === 'string' && version.startsWith('workspace:')) offenders.push(field + '.' + name + '=' + version); } } if (offenders.length) { console.error('workspace: protocol found in published manifest:'); for (const item of offenders) console.error('- ' + item); process.exit(1); } console.log('Manifest OK for npm publish: no workspace: protocols.');" "$manifest"

      - name: Publish to npm (Trusted Publishers)
        if: ${{ steps.already-published.outputs.already_published != 'true' }}
        working-directory: build-bundle/${{ needs.resolve-target.outputs.key }}
        run: npm publish --access public --ignore-scripts

  release-summary:
    name: Release summary
    runs-on: ubuntu-latest
    needs: [resolve-target, build-package, zip-package, publish-npm]
    if: ${{ always() }}

    steps:
      - name: Publish workflow summary
        shell: bash
        env:
          KEY: ${{ needs.resolve-target.outputs.key }}
          PACKAGE_NAME: ${{ needs.resolve-target.outputs.package_name }}
          VERSION: ${{ needs.resolve-target.outputs.version }}
          BUILD_RESULT: ${{ needs.build-package.result }}
          ZIP_RESULT: ${{ needs.zip-package.result }}
          PUBLISH_RESULT: ${{ needs.publish-npm.result }}
        run: |
          set -euo pipefail

          {
            echo "## Release summary"
            echo
            echo "- Tag: ${GITHUB_REF_NAME}"
            echo "- Package key: ${KEY}"
            echo "- Package name: ${PACKAGE_NAME}"
            echo "- Version: ${VERSION}"
            echo "- Build: ${BUILD_RESULT}"
            echo "- Zip and release: ${ZIP_RESULT}"
            echo "- npm publish: ${PUBLISH_RESULT}"
          } >> "$GITHUB_STEP_SUMMARY"
